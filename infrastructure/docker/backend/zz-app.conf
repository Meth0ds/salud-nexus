[www]
user = app
group = app
listen = 0.0.0.0:9000
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
request_terminate_timeout = 30s
rlimit_files = 4096
