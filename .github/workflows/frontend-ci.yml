name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml
  pull_request:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, unit, build and supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify registry signatures and attestations
        run: npm audit signatures

      - name: Audit high and critical advisories
        run: npm audit --audit-level=high

      - name: Check formatting
        run: npm run format:check

      - name: Lint all Angular projects
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build libraries and applications
        run: npm run build

      - name: Upload production bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: angular-production-bundles
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: Playwright Chromium
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies without lifecycle scripts
        run: npm.cmd ci --ignore-scripts --no-audit --no-fund

      - name: Install the pinned Chromium runtime
        run: npx.cmd playwright install chromium

      - name: Run browser and accessibility tests
        run: npm.cmd run test:e2e

      - name: Upload Playwright diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-diagnostics
          path: output/playwright
          if-no-files-found: warn
          retention-days: 7
